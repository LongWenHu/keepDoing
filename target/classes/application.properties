# 应用配置
spring.application.name=keepdoing

# 服务器配置
server.port=8080

# SQLite数据库配置
spring.datasource.url=jdbc:sqlite:./data/sqlite/db.sqlite
spring.datasource.driverClassName=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# JPA配置
spring.jpa.database-platform=com.hwl.KeepDoing.common.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true